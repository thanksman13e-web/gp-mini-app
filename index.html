<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gay Porn Yandex Search</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(180deg, #0a001f, #2a0033);
            color: #ff69b4;
            font-family: system-ui, sans-serif;
            text-align: center;
            min-height: 100vh;
        }
        h1 { 
            font-size: 32px; 
            margin: 20px 0 10px; 
            text-shadow: 0 0 30px #ff1493; 
        }
        input {
            width: 90%;
            max-width: 500px;
            padding: 18px;
            font-size: 18px;
            border: none;
            border-radius: 16px;
            background: #1f1f3a;
            color: white;
            margin: 20px 0;
            box-shadow: 0 5px 25px rgba(255,20,147,0.4);
        }
        button {
            background: linear-gradient(90deg, #ff1493, #ff4500);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 16px;
            margin: 10px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255,20,147,0.6);
        }
        button:active { transform: scale(0.95); }
        .info {
            margin-top: 30px;
            font-size: 15px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>🍆 Gay Porn через Яндекс</h1>
    <p>Напиши свою тему</p>

    <input type="text" id="query" placeholder="яндекс, twink, bear, daddy, rough anal..." autofocus>

    <br><br>
    <button onclick="searchYandex()">🔍 Искать в Яндекс + gay porno</button>

    <div class="info">
        Откроется Яндекс с твоим запросом + "gay porno"<br>
        (внешний браузер)
    </div>

    <script>
        function searchYandex() {
            let theme = document.getElementById('query').value.trim();
            
            if (!theme) {
                theme = "gay porno"; // если ничего не ввели
            }

            // Формируем запрос: тема + " gay porno"
            const fullQuery = encodeURIComponent(theme + " gay porno");

            // Яндекс поиск
            const yandexUrl = https://yandex.ru/search/?text=${fullQuery};

            // Открываем во внешнем браузере (самый стабильный способ)
            window.open(yandexUrl, '_blank');

            // Дополнительно можно открыть Pornhub напрямую по той же теме
            // const pornhubUrl = https://www.pornhub.com/gay/video/search?search=${fullQuery};
            // window.open(pornhubUrl, '_blank');
        }

        // Поддержка Enter
        document.getElementById('query').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchYandex();
            }
        });
    </script>
</body>
</html>
