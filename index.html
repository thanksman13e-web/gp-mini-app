<!DOCTYPE html>

        }
        
        .search-box {
            position: relative;
            margin-bottom: 45px;
        }
        
        input {
            width: 100%;
            padding: 24px 70px 24px 28px;
            font-size: 21px;
            background: rgba(31,31,58,0.9);
            border: 2px solid rgba(255,20,147,0.5);
            border-radius: 30px;
            color: white;
            box-shadow: 0 0 50px rgba(255,20,147,0.4);
        }
        
        input:focus {
            border-color: var(--neon-pink);
            box-shadow: 0 0 60px rgba(255,20,147,0.7);

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);

            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 21px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255,20,147,0.7);
        }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 16px;
            margin: 50px 0;
        }
        
        .cat-card {
            background: rgba(58,31,92,0.75);

            padding: 22px 16px;
            border-radius: 24px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .cat-card:hover {
            transform: translateY(-8px) scale(1.05);
            background: rgba(255,20,147,0.25);
            border-color: var(--neon-pink);
            box-shadow: 0 0 45px rgba(255,20,147,0.6);

        }
        
        .history-item {
            background: rgba(31,31,58,0.7);
            padding: 16px 20px;
            margin-bottom: 10px;

</head>

        const queryInput = document.getElementById('query');
        const historyContainer = document.getElementById('history');

        function saveToHistory(theme) {
            let history = JSON.parse(localStorage.getItem('pornHistory') || '[]');

                if (history.length > 8) history.pop();

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('pornHistory') || '[]');
            historyContainer.innerHTML = <h3>Недавние запросы</h3>;
            
            if (history.length === 0) {
                historyContainer.innerHTML += <p style="opacity:0.6;text-align:center;">Пока пусто...</p>;

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.textContent = item;
                div.onclick = () => {
                    queryInput.value = item;
                    searchAll();
                };
                historyContainer.appendChild(div);
            });

            const fullQuery = encodeURIComponent(theme + " gay porno");
            saveToHistory(theme);
            openSites(fullQuery);

        function quickSearch(cat) {
            queryInput.value = cat;
            searchAll();
        }

        // Enter

            if (e.key === 'Enter') searchAll();
        });

        // Инициализация
        window.onload = () => {
            renderHistory();
            queryInput.focus();
        };
    </script>

</html>
