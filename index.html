<!DOCTYPE html>
<html lang="ru">
<head>

        body {
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at center, #1a0033, #0a001f);
            color: #ff99cc;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 56px;
            background: linear-gradient(90deg, #ff1493, #c026d3, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 40px 0 8px;
            text-shadow: 0 0 40px rgba(255, 20, 147, 0.6);
        }

        p {
            font-size: 18px;
            opacity: 0.85;
            margin-bottom: 40px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        input {
            width: 100%;
            padding: 20px 24px;
            font-size: 20px;
            background: rgba(31, 31, 58, 0.95);
            border: 2px solid #ff1493;
            border-radius: 30px;
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ff4500;
            box-shadow: 0 0 0 4px rgba(255, 69, 0, 0.3);
            transform: scale(1.02);
        }

        .search-btn {
            width: 100%;
            padding: 20px;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #ff1493, #ff4500);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 20, 147, 0.5);
            transition: all 0.3s ease;
        }

        .search-btn:active {
            transform: scale(0.96);
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 14px;
            margin: 40px auto;
            max-width: 560px;
        }

        .cat-card {
            background: rgba(58, 31, 92, 0.85);
            padding: 18px 12px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 20, 147, 0.2);
        }

        .cat-card:hover {
            background: rgba(192, 38, 211, 0.6);
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 35px rgba(255, 20, 147, 0.4);
        }

        .history {
            margin-top: 60px;
            text-align: left;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
        }

        .history-item {
            background: rgba(31, 31, 58, 0.9);
            padding: 16px 20px;
            margin: 10px 0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: rgba(255, 20, 147, 0.2);
            transform: translateX(8px);
        }
    </style>
</head>

    <div class="container">
        <h1>NEON COCK</h1>
        <p>Гей-порно поиск • Яндекс + Pornhub + Xvideos</p>

        <input 
            type="text" 
            id="query" 
            placeholder="Введи тему... (twink, daddy, bareback...)" 
            autofocus
            autocomplete="off"
        >

        <button class="search-btn" onclick="searchAll()">🔥 НАЧАТЬ ПОИСК</button>

        <div class="categories"><div class="cat-card" onclick="quickSearch('twink')">Twink</div>
            <div class="cat-card" onclick="quickSearch('bear')">Bear</div>
            <div class="cat-card" onclick="quickSearch('daddy')">Daddy</div>
            <div class="cat-card" onclick="quickSearch('bareback')">Bareback</div>
            <div class="cat-card" onclick="quickSearch('creampie')">Creampie</div>
            <div class="cat-card" onclick="quickSearch('rough gay')">Rough</div>
            <div class="cat-card" onclick="quickSearch('big cock')">Big Cock</div>
            <div class="cat-card" onclick="quickSearch('muscle')">Muscle</div>
            <div class="cat-card" onclick="quickSearch('японский гей')">Японский</div>
        </div>

        <div class="history" id="history">
            <h3>Недавние запросы</h3>
        </div>
    </div>

    <script>
        const queryInput = document.getElementById('query');
        const historyEl = document.getElementById('history');

        function openAll(theme) {
            const encoded = encodeURIComponent(theme + " gay porno");
            
            window.open(`https://yandex.ru/search/?text=${encoded}`, '_blank');
            setTimeout(() => {
                window.open(`https://www.pornhub.com/gay/video/search?search=${encoded}`, '_blank');
            }, 400);
            setTimeout(() => {
                window.open(`https://www.xvideos.com/gay?k=${encoded}`, '_blank');
            }, 800);
        }

        function searchAll() {
            let theme = queryInput.value.trim();
            if (!theme) theme = "hardcore gay";

            saveHistory(theme);
            openAll(theme);
        }

        function quickSearch(cat) {
            queryInput.value = cat;
            searchAll();
        }

        function saveHistory(theme) {
            let hist = JSON.parse(localStorage.getItem('gayHistory') || '[]');
            hist = hist.filter(item => item !== theme);
            hist.unshift(theme);
            if (hist.length > 10) hist.pop();
            localStorage.setItem('gayHistory', JSON.stringify(hist));
            showHistory();
        }

        function showHistory() {
            let hist = JSON.parse(localStorage.getItem('gayHistory') || '[]');
            let html = <h3>Недавние запросы</h3>;
            
            if (hist.length === 0) {
                html += <p style="opacity:0.6; text-align:center; padding:20px;">Пока ничего не искали...</p>;
            } else {
                hist.forEach(item => {
                    html += `
                        <div class="history-item" onclick="selectHistory('${item.replace(/'/g, "\\'")}')">
                            ${item}
                        </div>
                    `;
                });
            }
            historyEl.innerHTML = html;
        }

        window.selectHistory = function(theme) {
            queryInput.value = theme;
            searchAll();
        };

        queryInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') searchAll();
        });

        window.onload = () => {
            showHistory();
            queryInput.focus();
        };
    </script>
</body>
</html>
